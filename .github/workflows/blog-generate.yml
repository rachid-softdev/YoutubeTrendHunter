name: AI Blog Generator

on:
  schedule:
    - cron: "0 6 * * 1"  # Every Monday at 6am UTC
  workflow_dispatch:
    inputs:
      count:
        description: "Nombre d'articles à générer"
        required: false
        default: "3"

concurrency:
  group: blog-generate
  cancel-in-progress: false

jobs:
  generate:
    name: Generate Blog Articles
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event.inputs.count != ''

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Generate articles
        run: npx tsx scripts/generate-blog-ai.ts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        continue-on-error: true

      - name: Count generated
        id: count
        run: |
          ARTICLES=$(jq '.meta.totalArticles' content/blog/articles.json 2>/dev/null || echo 0)
          echo "total_articles=$ARTICLES" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: github.event_name == 'schedule'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat(blog): AI generated articles"
          branch: blog/ai-generated-$(date +%Y%m%d)
          delete-branch: true
          title: "📝 Blog: $(date +'%Y-%m-%d') — AI Generated Articles"
          body: |
            ## AI Blog Generator Report
            **Date:** $(date +'%Y-%m-%d')
            **Total articles:** ${{ steps.count.outputs.total_articles }}

            Topics traités cette semaine.

            *Auto-generated by TrendHunter AI Blog Generator*
          labels: automated,blog,ai-generated