name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Check for pending changesets
        id: check
        run: |
          COUNT=$(find .changeset -name '*.md' ! -name 'config.json' 2>/dev/null | wc -l)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          if [ "$COUNT" -gt 0 ]; then
            echo "has=true" >> "$GITHUB_OUTPUT"
          else
            echo "has=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Version packages
        if: steps.check.outputs.has == 'true'
        run: pnpm version-packages

      - name: Update lockfile
        if: steps.check.outputs.has == 'true'
        run: pnpm install --no-frozen-lockfile

      - name: Build all packages (validation)
        if: steps.check.outputs.has == 'true'
        run: pnpm build

      - name: Commit version changes
        if: steps.check.outputs.has == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: version packages [skip ci]" \
            -m "Bumps versions and updates CHANGELOG.md based on pending changesets."

      - name: Create git tags
        if: steps.check.outputs.has == 'true'
        run: pnpm release

      - name: Push commits and tags
        if: steps.check.outputs.has == 'true'
        run: |
          git push origin main
          git push origin --tags

      - name: Create GitHub Releases
        if: steps.check.outputs.has == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag --sort=-creatordate | while read TAG; do
            if gh release view "$TAG" --json url &>/dev/null 2>&1; then
              echo "??  Release existe déjŕ pour $TAG"
            else
              echo "?? Création release pour $TAG"
              gh release create "$TAG" \
                --title "$TAG" \
                --notes "See the [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details." \
                --verify-tag
            fi
          done