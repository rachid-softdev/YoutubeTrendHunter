<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrendHunter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      background: #0F0F0F;
      color: #F1F1F1;
      min-height: 100vh;
      min-width: 350px;
    }

    /* ── Layout ── */
    #app { display: flex; flex-direction: column; min-height: 100vh; }
    .screen { display: none; flex-direction: column; flex: 1; }
    .screen.active { display: flex; }

    /* ── Header ── */
    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid #3D3D3D;
      background: #212121;
    }
    .logo { display: flex; align-items: center; gap: 8px; }
    .logo-icon {
      width: 28px; height: 28px;
      background: #FF0000;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-icon svg { width: 14px; height: 14px; fill: white; }
    .logo-text { font-size: 15px; font-weight: 700; color: #F1F1F1; }

    /* ── Auth Screen ── */
    #screen-auth {
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }
    .auth-box {
      width: 100%;
      border: 1px solid #3D3D3D;
      background: #212121;
      padding: 28px 24px;
    }
    .auth-box h2 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .auth-box p {
      font-size: 12px;
      color: #AAAAAA;
      margin-bottom: 20px;
    }

    /* ── Inputs ── */
    .input-field {
      width: 100%;
      height: 40px;
      padding: 0 12px;
      background: #0F0F0F;
      border: 1px solid #3D3D3D;
      color: #F1F1F1;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 10px;
    }
    .input-field:focus { border-color: #FF0000; }
    .input-field::placeholder { color: #717171; }

    /* ── Buttons ── */
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; height: 38px;
      border: none; cursor: pointer;
      font-size: 13px; font-weight: 700;
      transition: background 0.15s;
      text-decoration: none;
    }
    .btn-primary { background: #FF0000; color: white; }
    .btn-primary:hover { background: #CC0000; }
    .btn-ghost {
      background: transparent;
      border: 1px solid #3D3D3D;
      color: #AAAAAA;
    }
    .btn-ghost:hover { background: #272727; color: #F1F1F1; }
    .btn-link {
      background: none; border: none;
      color: #065FD4; font-size: 12px; cursor: pointer;
      text-decoration: underline;
      width: auto; height: auto;
      display: inline;
    }
    .btn-link:hover { color: #4F9EF8; }

    /* ── Divider ── */
    .divider {
      display: flex; align-items: center; gap: 10px;
      margin: 14px 0;
      color: #717171; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: #3D3D3D;
    }

    /* ── Main Screen ── */
    #screen-main { padding: 0; }
    .main-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid #3D3D3D;
      background: #212121;
      gap: 10px;
    }
    .plan-badge {
      display: inline-flex; align-items: center;
      padding: 2px 8px;
      background: rgba(255,0,0,0.1);
      border: 1px solid rgba(255,0,0,0.25);
      color: #FF0000;
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
    }

    /* ── Niche Select ── */
    .niche-select {
      height: 32px; padding: 0 10px;
      background: #0F0F0F; border: 1px solid #3D3D3D;
      color: #F1F1F1; font-size: 12px; font-weight: 700;
      cursor: pointer; outline: none;
    }
    .niche-select:focus { border-color: #FF0000; }

    /* ── Trends ── */
    #trends-list { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
    .trend-card {
      padding: 12px 14px;
      background: #212121;
      border: 1px solid #3D3D3D;
      display: flex; align-items: flex-start; gap: 12px;
      transition: border-color 0.15s;
    }
    .trend-card:hover { border-color: #717171; }
    .trend-card.hot { border-left: 2px solid #FF0000; }
    .trend-score {
      font-size: 18px; font-weight: 700;
      color: #FF0000; min-width: 36px; text-align: center;
    }
    .trend-body { flex: 1; min-width: 0; }
    .trend-keyword { font-size: 13px; font-weight: 700; margin-bottom: 2px; }
    .trend-niche { font-size: 11px; color: #AAAAAA; }
    .trend-volume { font-size: 11px; color: #AAAAAA; margin-top: 4px; }

    /* ── Footer ── */
    .main-footer {
      padding: 10px 14px;
      border-top: 1px solid #3D3D3D;
      background: #212121;
    }

    /* ── Loading ── */
    #screen-loading {
      align-items: center; justify-content: center;
      color: #AAAAAA; font-size: 12px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em; gap: 12px;
    }
    .spinner {
      width: 24px; height: 24px;
      border: 2px solid #3D3D3D;
      border-top-color: #FF0000;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Empty ── */
    .empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      flex: 1; padding: 32px 20px; text-align: center; color: #717171;
    }
    .empty-state p { font-size: 13px; margin-top: 8px; }
  </style>
</head>
<body>
<div id="app">

  <!-- ═══ AUTH ═══ -->
  <div id="screen-auth" class="screen active">
    <div class="auth-box">
      <div class="logo" style="margin-bottom: 20px;">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
        <span class="logo-text">TrendHunter</span>
      </div>

      <h2>Connexion</h2>
      <p>Entrez votre token API pour accéder aux tendances.</p>

      <input id="token-input" type="password" class="input-field" placeholder="Token API (ex: th_xxxx...)">
      <button id="btn-connect" class="btn btn-primary">SE CONNECTER</button>

      <div class="divider">ou</div>

      <a href="http://localhost:3000/billing" target="_blank" class="btn btn-ghost" style="font-size:12px;">
        OBTENIR UN TOKEN →
      </a>
    </div>
  </div>

  <!-- ═══ MAIN ═══ -->
  <div id="screen-main" class="screen">
    <div class="app-header">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
        <span class="logo-text">TrendHunter</span>
      </div>
      <span id="plan-badge" class="plan-badge">Free</span>
    </div>

    <div class="main-toolbar">
      <span style="font-size:12px; font-weight:700; color:#AAAAAA; text-transform:uppercase; letter-spacing:0.08em;">Niche</span>
      <select id="niche-select" class="niche-select">
        <option value="finance-personnelle">Finance</option>
        <option value="tech-ia">Tech & IA</option>
        <option value="fitness">Fitness</option>
        <option value="cuisine">Cuisine</option>
      </select>
    </div>

    <div id="trends-list"></div>

    <div class="main-footer">
      <button id="btn-logout" class="btn btn-ghost" style="font-size:11px;">SE DÉCONNECTER</button>
    </div>
  </div>

  <!-- ═══ LOADING ═══ -->
  <div id="screen-loading" class="screen">
    <div class="spinner"></div>
    <span>Chargement...</span>
  </div>

</div>

<script>
  const API_BASE = 'http://localhost:3000/api';
  let token = null;

  const $ = id => document.getElementById(id);

  function showScreen(name) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    $(name).classList.add('active');
  }

  function renderTrends(trends) {
    const list = $('trends-list');
    if (!trends || trends.length === 0) {
      list.innerHTML = `<div class="empty-state"><p>Aucune tendance trouvée pour cette niche.</p></div>`;
      return;
    }
    list.innerHTML = trends.map(t => `
      <div class="trend-card ${t.score >= 75 ? 'hot' : ''}">
        <div class="trend-score">${Math.round(t.score)}</div>
        <div class="trend-body">
          <div class="trend-keyword">${t.keyword}</div>
          <div class="trend-niche">${t.niche?.name || ''}</div>
          ${t.searchVolume ? `<div class="trend-volume">${Number(t.searchVolume).toLocaleString()} recherches/mois</div>` : ''}
        </div>
      </div>
    `).join('');
  }

  async function loadTrends(nicheSlug) {
    showScreen('screen-loading');
    try {
      const res = await fetch(`${API_BASE}/trends?niche=${nicheSlug}`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      const data = await res.json();
      renderTrends(data.trends || []);
      showScreen('screen-main');
    } catch {
      showScreen('screen-main');
    }
  }

  // Connect
  $('btn-connect').addEventListener('click', async () => {
    const t = $('token-input').value.trim();
    if (!t) return;
    token = t;
    localStorage.setItem('th_token', t);
    await loadTrends($('niche-select').value);
  });

  // Niche change
  $('niche-select').addEventListener('change', e => {
    loadTrends(e.target.value);
  });

  // Logout
  $('btn-logout').addEventListener('click', () => {
    token = null;
    localStorage.removeItem('th_token');
    $('token-input').value = '';
    showScreen('screen-auth');
  });

  // Auto-login if token saved
  const saved = localStorage.getItem('th_token');
  if (saved) {
    token = saved;
    loadTrends($('niche-select').value);
  } else {
    showScreen('screen-auth');
  }
</script>
</body>
</html>
