<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrendHunter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- ═══ AUTH ═══ -->
  <div id="screen-auth" class="screen">
    <div class="auth-box">
      <div class="logo" style="margin-bottom: 20px;">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
        <span class="logo-text">TrendHunter</span>
      </div>

      <h2>Connexion</h2>
      <p>Entrez votre token API pour accéder aux tendances.</p>

      <input id="token-input" type="password" class="input-field" placeholder="Token API (ex: th_xxxx...)">
      <button id="btn-connect" class="btn btn-primary">SE CONNECTER</button>

      <div class="divider">ou</div>

      <a href="http://localhost:3000/billing" target="_blank" class="btn btn-ghost" style="font-size:12px;">
        OBTENIR UN TOKEN →
      </a>
    </div>
  </div>

  <!-- ═══ MAIN ═══ -->
  <div id="screen-main" class="screen hidden">
    <div class="app-header">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
        <span class="logo-text">TrendHunter</span>
      </div>
      <span id="plan-badge" class="plan-badge">Free</span>
    </div>

    <div class="main-toolbar">
      <span>Niche</span>
      <select id="niche-select" class="niche-select"></select>
    </div>

    <div id="trends-list"></div>
    <div id="upgrade-banner" class="upgrade-banner hidden">
      <p>Passez en Pro pour plus de tendances !</p>
      <a href="http://localhost:3000/pricing" target="_blank" class="btn-upgrade">Voir les offres</a>
    </div>

    <div class="main-footer">
      <button id="btn-logout" class="btn btn-ghost" style="font-size:11px;">SE DÉCONNECTER</button>
    </div>
  </div>

  <!-- ═══ LOADING ═══ -->
  <div id="screen-loading" class="screen hidden">
    <div class="spinner"></div>
    <span>Chargement...</span>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
